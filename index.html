<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flower Robot · KBS Visualizer</title>
  <style>
    :root {
      --bg0: #0c0f14;
      --bg1: #141a24;
      --bg2: #1c2433;
      --line: #2a3548;
      --text: #e8edf5;
      --dim: #8b97ab;
      --cyan: #22d3ee;
      --lime: #a3e635;
      --rose: #fb7185;
      --amber: #fbbf24;
      --violet: #a78bfa;
      --font: "Segoe UI", Inter, system-ui, sans-serif;
      --mono: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg0);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
    }

    /* diagonal frame lines */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(135deg, transparent 48%, rgba(34, 211, 238, 0.04) 49%, rgba(34, 211, 238, 0.04) 51%, transparent 52%),
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(167, 139, 250, 0.12), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .frame {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      max-width: 1440px;
      margin: 0 auto;
      padding: 0;
    }

    /* ── top strip ── */
    .strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(20, 26, 36, 0.85);
      backdrop-filter: blur(8px);
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: linear-gradient(160deg, var(--cyan), var(--violet));
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 900;
    }

    .brand h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand small {
      display: block;
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .stat-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .stat-pill {
      font-size: 11px;
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--bg2);
      color: var(--dim);
      letter-spacing: 0.04em;
    }

    .stat-pill em {
      font-style: normal;
      color: var(--lime);
      font-weight: 700;
      margin-left: 6px;
    }

    .stat-pill.cost em { color: var(--cyan); }

    /* ── main triptych ── */
    .stage {
      display: grid;
      grid-template-columns: 220px 1fr 260px;
      min-height: 0;
      flex: 1;
    }

    /* left: vertical timeline */
    .timeline-col {
      border-right: 1px solid var(--line);
      background: var(--bg1);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .col-label {
      padding: 12px 16px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      border-bottom: 1px solid var(--line);
    }

    .timeline-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .t-step {
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 0 10px;
      padding: 8px 14px 8px 12px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 120ms ease, border-color 120ms ease;
    }

    .t-step:hover { background: rgba(255, 255, 255, 0.03); }

    .t-step.active {
      background: rgba(34, 211, 238, 0.08);
      border-left-color: var(--cyan);
    }

    .t-step.done { opacity: 0.55; }
    .t-step.done.active { opacity: 1; }

    .t-num {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      padding-top: 2px;
    }

    .t-step.active .t-num { color: var(--cyan); }

    .t-text {
      font-size: 11px;
      line-height: 1.4;
      color: var(--text);
      word-break: break-word;
    }

    .t-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 2px;
      margin-bottom: 3px;
    }

    .t-tag.move { background: rgba(34, 211, 238, 0.15); color: var(--cyan); }
    .t-tag.load { background: rgba(163, 230, 53, 0.15); color: var(--lime); }
    .t-tag.unload { background: rgba(251, 113, 133, 0.15); color: var(--rose); }
    .t-tag.start { background: rgba(139, 151, 171, 0.15); color: var(--dim); }

    /* center: arena */
    .arena {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      position: relative;
    }

    .arena-ring {
      position: relative;
      width: min(92vw, 520px);
      aspect-ratio: 1;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: radial-gradient(circle at 50% 40%, var(--bg2), var(--bg0));
      box-shadow: 0 0 60px rgba(34, 211, 238, 0.06), inset 0 0 40px rgba(0, 0, 0, 0.4);
    }

    .arena-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid var(--line);
      position: relative;
      background: #111820;
    }

    .board {
      position: absolute;
      inset: 8%;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .cell {
      position: relative;
      border: 1px solid rgba(42, 53, 72, 0.8);
      background: #161d28;
      transition: background 150ms ease;
    }

    .cell.visited { background: #1a2838; }
    .cell.current { background: #2a2208; box-shadow: inset 0 0 0 2px var(--amber); }
    .cell.complete { background: #142318; }

    .coord {
      position: absolute;
      top: 2px;
      left: 4px;
      font-family: var(--mono);
      font-size: 8px;
      color: #4a5568;
    }

    .mark {
      position: absolute;
      right: 2px;
      bottom: 2px;
      font-size: 8px;
      font-weight: 700;
      color: var(--accent, var(--cyan));
      background: rgba(0, 0, 0, 0.6);
      padding: 1px 4px;
      border-radius: 2px;
      border: 1px solid var(--accent, var(--line));
    }

    .route-layer {
      position: absolute;
      inset: 8%;
      pointer-events: none;
      z-index: 3;
      border-radius: 8px;
    }

    .route-base {
      fill: none;
      stroke: rgba(139, 151, 171, 0.15);
      stroke-width: 1;
    }

    .route-live {
      fill: none;
      stroke: var(--cyan);
      stroke-width: 2;
      stroke-linecap: round;
      filter: drop-shadow(0 0 4px rgba(34, 211, 238, 0.5));
    }

    .robot {
      position: absolute;
      width: 11%;
      aspect-ratio: 1;
      z-index: 5;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      background: linear-gradient(180deg, var(--amber), #d97706);
      border: 2px solid #fff;
      transition: left 240ms ease, top 240ms ease;
      box-shadow: 0 0 16px rgba(251, 191, 36, 0.5);
    }

    .pos-readout {
      margin-top: 18px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--cyan);
      letter-spacing: 0.08em;
    }

    .legend-ring {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
      max-width: 520px;
    }

    .leg {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--accent, var(--line));
      color: var(--accent, var(--dim));
      background: rgba(0, 0, 0, 0.3);
    }

    /* right: control deck */
    .deck {
      border-left: 1px solid var(--line);
      background: var(--bg1);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .deck-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .transport {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: 6px;
    }

    .transport button {
      height: 40px;
      border: 1px solid var(--line);
      background: var(--bg2);
      color: var(--text);
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 120ms, border-color 120ms;
    }

    .transport button:hover { border-color: var(--cyan); background: #1e2a3d; }

    .transport .play {
      background: linear-gradient(180deg, #1e3a5f, #152238);
      border-color: var(--cyan);
      color: var(--cyan);
      font-weight: 700;
    }

    .scrub {
      width: 100%;
      accent-color: var(--cyan);
      margin-top: 4px;
    }

    .readout-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: var(--bg0);
    }

    .readout-box .phase {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .readout-box.move .phase { color: var(--cyan); }
    .readout-box.load .phase { color: var(--lime); }
    .readout-box.unload .phase { color: var(--rose); }
    .readout-box.start .phase { color: var(--dim); }

    .readout-box .action {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
      word-break: break-word;
    }

    .meter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .meter {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
    }

    .meter label {
      display: block;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 4px;
    }

    .meter output {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .meter output.accent { color: var(--cyan); }

    .cargo-zone {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 28px;
    }

    .cargo-chip {
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(251, 191, 36, 0.12);
      border: 1px solid rgba(251, 191, 36, 0.3);
      color: var(--amber);
    }

    .empty-cargo {
      font-size: 11px;
      color: var(--dim);
      font-style: italic;
    }

    .pav-list { display: flex; flex-direction: column; gap: 6px; }

    .pav {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 2px 8px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--line);
      font-size: 11px;
      background: var(--bg2);
    }

    .pav.done { border-color: rgba(163, 230, 53, 0.4); background: rgba(163, 230, 53, 0.06); }
    .pav.active { border-color: rgba(34, 211, 238, 0.4); background: rgba(34, 211, 238, 0.06); }

    .pav-name { font-weight: 600; }
    .pav-flower { color: var(--dim); font-size: 10px; }
    .pav-val { font-family: var(--mono); font-weight: 700; color: var(--accent, var(--lime)); grid-row: 1 / 3; align-self: center; }

    .pav-track {
      grid-column: 1 / -1;
      height: 3px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
    }

    .pav-track span {
      display: block;
      height: 100%;
      width: var(--pct);
      background: var(--accent, var(--cyan));
    }

    /* bottom dock */
    .dock {
      border-top: 1px solid var(--line);
      background: var(--bg1);
      padding: 12px 20px;
    }

    .dock-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: none;
      border: none;
      color: var(--dim);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0 0 10px;
    }

    .dock-toggle:hover { color: var(--text); }

    .dock-panel {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
      max-height: 160px;
      overflow-y: auto;
    }

    .dock-panel.open { display: grid; }

    .trip-card {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: var(--bg2);
      font-size: 10px;
      line-height: 1.4;
    }

    .trip-card b {
      display: block;
      color: var(--cyan);
      margin-bottom: 2px;
      font-size: 11px;
    }

    .tree-mono {
      grid-column: 1 / -1;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      line-height: 1.6;
      max-height: 100px;
      overflow-y: auto;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--bg0);
    }

    @media (max-width: 960px) {
      .stage {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
      }

      .timeline-col {
        border-right: none;
        border-bottom: 1px solid var(--line);
        max-height: 140px;
      }

      .deck {
        border-left: none;
        border-top: 1px solid var(--line);
      }

      .arena-ring {
        width: min(88vw, 400px);
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <header class="strip">
      <div class="brand">
        <div class="brand-icon">FR</div>
        <div>
          <h1>Flower Robot</h1>
          <small>Knowledge Base · A* Search Replay</small>
        </div>
      </div>
      <div class="stat-row">
        <span class="stat-pill" id="gridInfo">GRID</span>
        <span class="stat-pill" id="warehouseInfo">WH</span>
        <span class="stat-pill cost" id="costInfo">COST</span>
        <span class="stat-pill" id="maxLoadInfo">LOAD</span>
        <span class="stat-pill" id="stepLabel">STEP</span>
      </div>
    </header>

    <div class="stage">
      <nav class="timeline-col" aria-label="Solution steps">
        <div class="col-label">Path</div>
        <div class="timeline-scroll" id="timeline"></div>
      </nav>

      <section class="arena">
        <div class="arena-ring">
          <div class="arena-inner">
            <svg class="route-layer" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              <polyline class="route-base" id="routeBase"></polyline>
              <polyline class="route-live" id="routeLive"></polyline>
            </svg>
            <div class="board" id="board"></div>
            <div class="robot" id="robot" aria-label="robot"></div>
          </div>
        </div>
        <div class="pos-readout" id="position">POS · (0, 0)</div>
        <div class="legend-ring" id="legend"></div>
      </section>

      <aside class="deck">
        <div class="col-label">Control</div>
        <div class="deck-body">
          <div class="transport">
            <button id="prevBtn" aria-label="Previous">◀</button>
            <button class="play" id="playBtn" aria-label="Play">▶ PLAY</button>
            <button id="nextBtn" aria-label="Next">▶</button>
          </div>
          <input class="scrub" id="stepRange" type="range" min="0" value="0" aria-label="Step">
          <button id="resetBtn" style="height:32px;font-size:11px;letter-spacing:0.08em;background:var(--bg2);border:1px solid var(--line);color:var(--dim);border-radius:6px;cursor:pointer;">RESET TO START</button>

          <div class="readout-box start" id="readout">
            <div class="phase" id="phaseLabel">Start</div>
            <div class="action" id="action">Initial state</div>
          </div>

          <div class="meter-grid">
            <div class="meter"><label>g(n) cost</label><output class="accent" id="cost">0</output></div>
            <div class="meter"><label>Cargo</label><output id="load">0</output></div>
            <div class="meter"><label>Delivered</label><output id="delivered">0</output></div>
            <div class="meter"><label>Remaining</label><output id="openDemand">0</output></div>
          </div>

          <div>
            <div class="col-label" style="padding:0 0 8px;border:none;">Cargo bay</div>
            <div class="cargo-zone" id="cargo"></div>
          </div>

          <div>
            <div class="col-label" style="padding:0 0 8px;border:none;">Pavilions</div>
            <div class="pav-list" id="mission"></div>
          </div>
        </div>
      </aside>
    </div>

    <footer class="dock">
      <button type="button" class="dock-toggle" id="dockToggle" aria-expanded="false">
        <span>Trips &amp; generated states</span>
        <span id="dockChevron">+</span>
      </button>
      <div class="dock-panel" id="dockPanel">
        <div id="trips"></div>
        <div class="tree-mono" id="tree"></div>
      </div>
    </footer>
  </div>

  <script src="solution_data.js"></script>
  <script>
    const data = window.FLOWER_ROBOT_DATA;
    const items = data.items;
    const states = data.states;
    const generated = data.generated;
    const targets = data.targets;
    const trips = data.trips;
    const grid = data.grid;
    const warehouse = data.warehouse;
    const totalNeed = total(items.map(i => i[3]));
    const cellW = 100 / grid.width;
    const cellH = 100 / grid.height;
    const palette = ["#22d3ee", "#fb7185", "#fbbf24", "#a78bfa", "#a3e635", "#38bdf8", "#f472b6", "#4ade80"];

    const $ = id => document.getElementById(id);
    const cells = () => [...document.querySelectorAll(".cell")];
    const posKey = p => `${p[0]},${p[1]}`;
    const routePt = s => `${(s.pos[0] - 0.5) * cellW},${(grid.height - s.pos[1] + 0.5) * cellH}`;
    const routePts = n => states.slice(0, n + 1).map(routePt).join(" ");
    function total(a) { return a.reduce((s, v) => s + v, 0); }
    const pct = (d, n) => n ? `${Math.round(d / n * 100)}%` : "0%";
    const kind = l => l.startsWith("load") ? "load" : l.startsWith("unload") ? "unload" : l.startsWith("move") ? "move" : "start";
    const phase = l => ({ load: "Load +1", unload: "Unload +1", move: "Move +1", start: "Idle" }[kind(l)]);
    const clip = l => l.length > 42 ? l.slice(0, 40) + "…" : l;

    const targetAt = p => targets.find(t => posKey(t.pos) === posKey(p));
    const tIdx = t => targets.findIndex(e => e.name === t.name);
    const tColor = t => palette[(tIdx(t) + palette.length) % palette.length];
    const tStyle = t => `style="--accent:${tColor(t)}"`;

    const cellItems = k => items.map((item, i) => ({ item, i })).filter(e => posKey(e.item[4]) === k);
    const needAt = k => total(cellItems(k).map(e => e.item[3]));
    const delAt = (s, k) => total(cellItems(k).map(e => s.delivered[e.i]));
    const doneAt = (s, k) => needAt(k) > 0 && delAt(s, k) === needAt(k);
    const flowerOf = t => (items.find(i => i[0] === t.name) || ["", "—"])[1];

    const mark = p => {
      const t = targetAt(p);
      if (!t) return "";
      const s = t.name === "Warehouse" ? "W" : "P" + t.name.replace(/\D/g, "");
      return `<span class="mark" ${tStyle(t)}>${s}</span>`;
    };

    const cellHtml = (_, i) => {
      const x = (i % grid.width) + 1;
      const y = grid.height - Math.floor(i / grid.width);
      return `<div class="cell" data-x="${x}" data-y="${y}"><span class="coord">${x},${y}</span>${mark([x, y])}</div>`;
    };

    /* robot positioned inside arena-inner (full box), board inset 8% */
    const botLeft = p => `calc(8% + ${(p[0] - 1) * cellW * 0.84}% + ${cellW * 0.84 * 0.35}%)`;
    const botTop = p => `calc(8% + ${(grid.height - p[1]) * cellH * 0.84}% + ${cellH * 0.84 * 0.35}%)`;

    const missions = () => targets.filter(t => t.name !== "Warehouse");

    let step = 0, timer = 0;

    const paint = v => {
      step = Math.max(0, Math.min(states.length - 1, +v));
      const s = states[step];
      const vis = [...new Set(states.slice(0, step + 1).map(x => posKey(x.pos)))];

      $("robot").style.left = botLeft(s.pos);
      $("robot").style.top = botTop(s.pos);
      $("routeBase").setAttribute("points", routePts(states.length - 1));
      $("routeLive").setAttribute("points", routePts(step));
      $("position").textContent = `POS · (${s.pos[0]}, ${s.pos[1]}) · g=${s.cost}`;
      $("stepLabel").innerHTML = `STEP <em>${step}/${states.length - 1}</em>`;
      $("stepRange").value = step;
      $("action").textContent = s.label;
      $("cost").textContent = s.cost;
      $("load").textContent = `${total(s.cargo)}/${data.maxLoad}`;
      $("delivered").textContent = `${total(s.delivered)}/${totalNeed}`;
      $("openDemand").textContent = totalNeed - total(s.delivered);
      $("phaseLabel").textContent = phase(s.label);
      $("readout").className = `readout-box ${kind(s.label)}`;

      const cargo = items.map((item, i) => ({ v: s.cargo[i], item })).filter(x => x.v > 0);
      $("cargo").innerHTML = cargo.length
        ? cargo.map(x => `<span class="cargo-chip">${x.item[1]} ${x.item[2]} ×${x.v}</span>`).join("")
        : `<span class="empty-cargo">— empty —</span>`;

      $("mission").innerHTML = missions().map(t => {
        const k = posKey(t.pos);
        const d = delAt(s, k), n = needAt(k);
        const cls = d === n ? " done" : d > 0 ? " active" : "";
        return `<div class="pav${cls}" ${tStyle(t)}><span class="pav-name">${t.name}</span><span class="pav-val">${d}/${n}</span><span class="pav-flower">${flowerOf(t)}</span><div class="pav-track"><span style="--pct:${pct(d, n)}"></span></div></div>`;
      }).join("");

      cells().forEach(el => {
        const k = `${el.dataset.x},${el.dataset.y}`;
        el.classList.toggle("visited", vis.includes(k));
        el.classList.toggle("current", k === posKey(s.pos));
        el.classList.toggle("complete", doneAt(s, k));
      });

      [...document.querySelectorAll(".t-step")].forEach((el, i) => {
        el.classList.toggle("active", i === step);
        el.classList.toggle("done", i < step);
      });

      const active = document.querySelector(".t-step.active");
      if (active) active.scrollIntoView({ block: "nearest", behavior: "smooth" });
    };

    const stop = () => { clearInterval(timer); timer = 0; $("playBtn").textContent = "▶ PLAY"; };
    const play = () => {
      if (timer) return stop();
      timer = setInterval(() => step < states.length - 1 ? paint(step + 1) : stop(), 750);
      $("playBtn").textContent = "⏸ PAUSE";
    };

    $("board").style.gridTemplateColumns = `repeat(${grid.width}, 1fr)`;
    $("board").innerHTML = Array.from({ length: grid.width * grid.height }, cellHtml).join("");

    $("gridInfo").innerHTML = `GRID <em>${grid.width}×${grid.height}</em>`;
    $("warehouseInfo").innerHTML = `WH <em>(${warehouse[0]},${warehouse[1]})</em>`;
    $("costInfo").innerHTML = `COST <em>${data.optimalCost}</em>`;
    $("maxLoadInfo").innerHTML = `MAX <em>${data.maxLoad}</em>`;
    $("stepRange").max = states.length - 1;

    $("legend").innerHTML = targets.map(t => {
      const n = t.name === "Warehouse" ? "Warehouse" : `${flowerOf(t)} · ${total(items.filter(i => i[0] === t.name).map(i => i[3]))}`;
      return `<span class="leg" ${tStyle(t)}>${t.name} · ${n}</span>`;
    }).join("");

    $("timeline").innerHTML = states.map((s, i) => {
      const k = kind(s.label);
      const txt = k === "start" ? "Initial state" : clip(s.label);
      return `<div class="t-step" data-step="${i}"><span class="t-num">${String(i).padStart(2, "0")}</span><div><span class="t-tag ${k}">${k}</span><div class="t-text">${txt}</div></div></div>`;
    }).join("");

    $("trips").innerHTML = trips.map(t => `<div class="trip-card"><b>${t.name}</b>${clip(t.label)} · g=${t.cost}</div>`).join("");
    $("tree").innerHTML = generated.map((l, i) => `${i + 1}. ${l}`).join("\n");

    $("timeline").addEventListener("click", e => {
      const row = e.target.closest(".t-step");
      if (row) { stop(); paint(row.dataset.step); }
    });

    $("dockToggle").addEventListener("click", () => {
      const p = $("dockPanel");
      const o = p.classList.toggle("open");
      $("dockToggle").setAttribute("aria-expanded", o);
      $("dockChevron").textContent = o ? "−" : "+";
    });

    $("stepRange").addEventListener("input", e => { stop(); paint(e.target.value); });
    $("prevBtn").addEventListener("click", () => { stop(); paint(step - 1); });
    $("nextBtn").addEventListener("click", () => { stop(); paint(step + 1); });
    $("resetBtn").addEventListener("click", () => { stop(); paint(0); });
    $("playBtn").addEventListener("click", play);
    paint(0);
  </script>
</body>
</html>
